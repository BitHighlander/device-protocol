name: Build & Publish

on:
  push:
    branches: [develop, master]
  pull_request:
    branches: [develop, master]

permissions:
  id-token: write
  contents: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: mkdir -p lib && npm run build

      - name: Test
        run: npm test

      - name: Upload lib artifact
        uses: actions/upload-artifact@v4
        with:
          name: lib
          path: lib/

  publish-prerelease:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: mkdir -p lib && npm run build

      - name: Set pre-release version
        run: |
          BASE=$(node -p "require('./package.json').version")
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          PRE_VERSION="${BASE}-pre.${SHORT_SHA}"
          npm version "$PRE_VERSION" --no-git-tag-version
          echo "Publishing ${PRE_VERSION}"

      - name: Debug auth setup
        run: |
          echo "npm: $(npm --version)"
          echo "node: $(node --version)"
          echo "OIDC URL: ${ACTIONS_ID_TOKEN_REQUEST_URL:+SET}"
          echo "OIDC TOKEN: ${ACTIONS_ID_TOKEN_REQUEST_TOKEN:+SET}"
          echo "NODE_AUTH_TOKEN: ${NODE_AUTH_TOKEN:+SET}"
          cat ~/.npmrc 2>/dev/null || echo "no user .npmrc"
          cat .npmrc 2>/dev/null || echo "no project .npmrc"

      - name: Publish pre-release
        run: npm publish --access public --tag pre --loglevel verbose

  publish-stable:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: mkdir -p lib && npm run build

      - name: Test
        run: npm test

      - name: Publish to npm
        run: npm publish --access public

      - name: Create git tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          git tag "v${VERSION}"
          git push origin "v${VERSION}"
