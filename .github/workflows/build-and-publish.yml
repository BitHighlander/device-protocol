name: Build & Publish

on:
  push:
    branches: [develop, master]
  pull_request:
    branches: [develop, master]
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Verify lib output
        run: |
          test -f lib/proto.json || (echo "proto.json missing" && exit 1)
          test -f lib/messages_pb.js || (echo "messages_pb.js missing" && exit 1)
          echo "Build artifacts OK"

      - name: Upload lib artifact
        uses: actions/upload-artifact@v4
        with:
          name: lib
          path: lib/

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
